function loadImageFallback(box, paths, fallbackText){
  const el = typeof box === "string" ? document.querySelector(box) : box;
  if(!el) return;
  let i = 0;
  function tryNext(){
    if(i >= paths.length){ el.innerHTML = `<span class="fallback-text">${fallbackText}</span>`; return; }
    const img = new Image();
    img.onload = () => { el.innerHTML = ""; el.appendChild(img); };
    img.onerror = () => { i++; tryNext(); };
    img.src = paths[i];
    img.alt = fallbackText;
  }
  tryNext();
}

function setMsg(m,c="notice"){$("msg").innerHTML=m?`<div class="${c}">${esc(m)}</div>`:""}
$("birth_date").onchange=()=>{const d=new Date($("birth_date").value); if(!isNaN(d)){const n=new Date();let a=n.getFullYear()-d.getFullYear();const mm=n.getMonth()-d.getMonth();if(mm<0||(mm===0&&n.getDate()<d.getDate()))a--;$("age").value=a;}}
async function savePatient(){
  await getSessionUser();
  const hn = $("hn").value.trim() || ("PT" + Date.now().toString().slice(-10));
  const h = Number($("height").value || 0);
  const w = Number($("weight").value || 0);
  const bmi = (h && w) ? (w / ((h / 100) * (h / 100))).toFixed(2) : null;
  const langText = PAGE_I18N[getLang()] || PAGE_I18N.th;

  const baseRow = {
    patient_code: hn,
    hn: hn,
    full_name: $("full_name").value.trim(),
    gender: $("gender").value,
    sex: $("gender").value,
    birth_date: $("birth_date").value || null,
    age: Number($("age").value || 0) || null,
    phone: $("phone").value.trim(),
    phone_number: $("phone").value.trim(),
    weight: w || null,
    height: h || null,
    bmi: bmi,
    disease: $("disease").value.trim(),
    underlying_disease: $("disease").value.trim(),
    allergy: $("allergy").value.trim(),
    created_at: new Date().toISOString(),
    updated_at: new Date().toISOString()
  };

  if (!baseRow.full_name) {
    setMsg(langText.needName, "notice err");
    return;
  }

  const payloads = [
    baseRow,
    (() => { const r = {...baseRow}; delete r.allergy; return r; })(),
    (() => { const r = {...baseRow}; ["allergy","disease","underlying_disease","phone_number","sex","bmi","updated_at"].forEach(k => delete r[k]); return r; })()
  ];

  let lastError = null;
  for (const row of payloads) {
    try {
      const { error } = await sb.from("patients").insert(row);
      if (!error) {
        setMsg(langText.saved, "notice ok");
        setTimeout(() => location.href = "patients.html", 700);
        return;
      }
      lastError = error;
      const msg = (error.message || "").toLowerCase();
      const retryable = msg.includes("schema cache") || msg.includes("column") || msg.includes("could not find");
      if (!retryable) break;
    } catch (e) {
      lastError = e;
    }
  }

  setMsg(langText.saveError + ((lastError && lastError.message) || lastError || "Unknown error"), "notice err");
}
$("saveBtn").onclick=savePatient;
function initCreatePatientPage(){
  const lang = getLang();
  LANG_KEYS.forEach(k => localStorage.setItem(k, lang));

}

  if (e.key === THEME_KEY || e.key === "theme") applyTheme();
});
