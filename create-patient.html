function getLang(){
  for (const k of LANG_KEYS) {
    const v = localStorage.getItem(k);
    if (v === "th" || v === "en") return v;
  }
  return "th";
}
function setLang(lang){
  lang = (lang === "en") ? "en" : "th";
  LANG_KEYS.forEach(k => localStorage.setItem(k, lang));
  document.documentElement.lang = lang;
  applyPageLanguage();
  mountSidebar("create");
  applyLangSelect();
}
function applyPageLanguage(){
  const lang=getLang();
  const t=PAGE_I18N[lang]||PAGE_I18N.th;
  const set=(id,txt)=>{ const el=$(id); if(el) el.textContent=txt; };
  const ph=(id,txt)=>{ const el=$(id); if(el) el.placeholder=txt; };
  set("crumb",t.crumb); set("title",t.title); set("sub",t.sub); set("hero",t.hero); set("heroSub",t.heroSub);
  document.querySelector('label[for="full_name"], label[data-label="full_name"]')?.removeAttribute('for');

  const texts=[t.fullName,t.hn,t.gender,t.birthDate,t.age,t.phone,t.weight,t.height,t.disease,t.allergy];
  labels.forEach((l,i)=>{ if(texts[i]) l.textContent=texts[i]; });
  ph("full_name",t.fullNamePh); ph("hn",t.hnPh); ph("age",t.agePh); ph("phone",t.phonePh); ph("disease",t.diseasePh); ph("allergy",t.allergyPh);
  const g=$("gender"); if(g){
    g.options[0].textContent=t.genderEmpty;

    g.options[2].textContent=t.female;
  }
  const cancel=document.querySelector('.btn-outline'); if(cancel) cancel.textContent=t.cancel;
  set("saveBtn",t.save);
}
function applyLangSelect(){ document.querySelectorAll("[data-lang-select]").forEach(s=>{s.innerHTML='<option value="th">ไทย</option><option value="en">English</option>'; s.value=getLang(); s.onchange=()=>setLang(s.value);}); }
function applyTheme(){
  const theme = localStorage.getItem(THEME_KEY) || localStorage.getItem("theme") || "light";

function safe(v,f="-"){ return (v===null||v===undefined||v==="")?f:v; }
function esc(v){ return String(safe(v,"")).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;"); }
function initials(name,email){ const s=(name||email||"U").trim(); return (s[0]||"U").toUpperCase(); }
async function getSessionUser(){
  const {data} = await sb.auth.getSession();
  if(!data.session) { location.href="index.html"; return null; }
  return data.session.user;
}
async function signOut(){ try{ await sb.auth.signOut(); }catch(e){} location.href="index.html"; }
function wireLogout(){ const b=$("logoutBtn"); if(b) b.onclick=signOut; }
async function loadCurrentProfile(){
  const user = await getSessionUser();
  if(!user) return null;
  let profile = null;
  try {
    let r = await sb.from("profiles").select("*").eq("id", user.id).maybeSingle();
    if(!r.error && r.data) profile = r.data;
  } catch(e){}
  if(!profile) {
    try {
      let r = await sb.from("profiles").select("*").eq("email", user.email).maybeSingle();
      if(!r.error && r.data) profile = r.data;
    } catch(e){}
  }
  return {
    user,
    profile: profile || {},
    displayName: (profile && (profile.full_name||profile.name||profile.display_name)) || user.user_metadata?.full_name || user.email || "ผู้ใช้งาน",
    role: (profile && (profile.role||profile.position||profile.user_role)) || "แพทย์",
    email: user.email
  };
}

function loadImageFallback(box, paths, fallbackText){
  const el = typeof box === "string" ? document.querySelector(box) : box;
  if(!el) return;
  let i = 0;
  function tryNext(){
    if(i >= paths.length){ el.innerHTML = `<span class="fallback-text">${fallbackText}</span>`; return; }
    const img = new Image();
    img.onload = () => { el.innerHTML = ""; el.appendChild(img); };
    img.onerror = () => { i++; tryNext(); };
    img.src = paths[i];
    img.alt = fallbackText;
  }
  tryNext();
}

}
function mountSidebar(active){ document.getElementById("sidebarMount").innerHTML = sidebar(active); applySidebarLogos(); wireLogout(); }

function setMsg(m,c="notice"){$("msg").innerHTML=m?`<div class="${c}">${esc(m)}</div>`:""}
$("birth_date").onchange=()=>{const d=new Date($("birth_date").value); if(!isNaN(d)){const n=new Date();let a=n.getFullYear()-d.getFullYear();const mm=n.getMonth()-d.getMonth();if(mm<0||(mm===0&&n.getDate()<d.getDate()))a--;$("age").value=a;}}
async function savePatient(){
  await getSessionUser();
  const hn = $("hn").value.trim() || ("PT" + Date.now().toString().slice(-10));
  const h = Number($("height").value || 0);
  const w = Number($("weight").value || 0);
  const bmi = (h && w) ? (w / ((h / 100) * (h / 100))).toFixed(2) : null;
  const langText = PAGE_I18N[getLang()] || PAGE_I18N.th;

  const baseRow = {
    patient_code: hn,
    hn: hn,
    full_name: $("full_name").value.trim(),
    gender: $("gender").value,
    sex: $("gender").value,
    birth_date: $("birth_date").value || null,
    age: Number($("age").value || 0) || null,
    phone: $("phone").value.trim(),
    phone_number: $("phone").value.trim(),
    weight: w || null,
    height: h || null,
    bmi: bmi,
    disease: $("disease").value.trim(),
    underlying_disease: $("disease").value.trim(),
    allergy: $("allergy").value.trim(),
    created_at: new Date().toISOString(),
    updated_at: new Date().toISOString()
  };

  if (!baseRow.full_name) {
    setMsg(langText.needName, "notice err");
    return;
  }

  const payloads = [
    baseRow,
    (() => { const r = {...baseRow}; delete r.allergy; return r; })(),
    (() => { const r = {...baseRow}; ["allergy","disease","underlying_disease","phone_number","sex","bmi","updated_at"].forEach(k => delete r[k]); return r; })()
  ];

  let lastError = null;
  for (const row of payloads) {
    try {
      const { error } = await sb.from("patients").insert(row);
      if (!error) {
        setMsg(langText.saved, "notice ok");
        setTimeout(() => location.href = "patients.html", 700);
        return;
      }
      lastError = error;
      const msg = (error.message || "").toLowerCase();
      const retryable = msg.includes("schema cache") || msg.includes("column") || msg.includes("could not find");
      if (!retryable) break;
    } catch (e) {
      lastError = e;
    }
  }

  setMsg(langText.saveError + ((lastError && lastError.message) || lastError || "Unknown error"), "notice err");
}
$("saveBtn").onclick=savePatient;
function initCreatePatientPage(){
  const lang = getLang();
  LANG_KEYS.forEach(k => localStorage.setItem(k, lang));
  document.documentElement.lang = lang;
  applyTheme();
  mountSidebar("create");
  applyLangSelect();
  applyPageLanguage();
}
window.addEventListener("storage", (e) => {
  if (LANG_KEYS.includes(e.key)) initCreatePatientPage();
  if (e.key === THEME_KEY || e.key === "theme") applyTheme();
});
initCreatePatientPage();
