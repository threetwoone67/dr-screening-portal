<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Report Document | DR Screening Portal</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="report-style.css?v=mobilepdf1">
  <style>
    body{
      background:#f4f7fd;
      margin:0;
      font-family:var(--font-main,'Sarabun',Arial,sans-serif)!important;
      color:#0f172a;
      overflow-x:hidden;
    }
    .reportOnlyWrap{
      min-height:100vh;
      padding:18px 10px;
      display:flex;
      justify-content:center;
      align-items:flex-start;
    }
    .reportOnlyBox{
      width:100%;
      max-width:940px;
    }
    .paperbox{
      background:transparent!important;
      border:0!important;
      box-shadow:none!important;
      padding:0!important;
      border-radius:0!important;
      display:block!important;
      width:100%;
      overflow:visible;
    }
    #paperContainer{
      width:100%;
      overflow:visible;
      margin:0 auto;
    }
    .paper{
      margin:0 auto!important;
      overflow:hidden;
      box-shadow:0 18px 44px rgba(15,23,42,.08);
    }
    .empty{
      background:#fff;
      border:1px dashed #cbd5e1;
      border-radius:16px;
      padding:28px;
      text-align:center;
      color:#64748b;
      font-weight:800;
    }
    .publicOnlyNote{
      max-width:794px;
      margin:0 auto 10px;
      color:#64748b;
      font-size:12px;
      font-weight:800;
      text-align:center;
    }
    .staffOpenSystem{
      display:none;
      max-width:794px;
      margin:0 auto 10px;
      text-align:right;
    }
    .staffOpenSystem a{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:38px;
      padding:0 14px;
      border-radius:12px;
      background:#315be8;
      color:#fff;
      font-weight:900;
      text-decoration:none;
      box-shadow:0 10px 22px rgba(49,91,232,.18);
    }
    body.logged-in .staffOpenSystem{display:block;}
    #drSidebarHost,.dr-sidebar,.sidebar,aside.sidebar,.side-bar,.app-sidebar,.left-sidebar,.mobile-sidebar-toggle,.mobile-sidebar-overlay,
    .dr-report-mobile-bottom-nav,.dr-report-mobile-more-overlay,.dr-report-mobile-more-sheet,.mobile-bottom-nav,.bottom-nav,.actions,.top,.stats,.card,.side{
      display:none!important;
    }
    body.has-dr-sidebar{padding-left:0!important;}

    @media(max-width:768px){
      body{background:#eef4ff!important;}
      .reportOnlyWrap{
        padding:8px 0 22px!important;
        width:100vw!important;
        max-width:100vw!important;
        overflow:hidden!important;
        display:block!important;
      }
      .reportOnlyBox{
        width:100vw!important;
        max-width:100vw!important;
        overflow:hidden!important;
        margin:0!important;
      }
      .staffOpenSystem{
        width:calc(100vw - 18px)!important;
        max-width:none!important;
        margin:0 auto 8px!important;
        padding:0 8px!important;
        box-sizing:border-box!important;
      }
      .publicOnlyNote{display:none!important;}
      .paperbox{
        width:100vw!important;
        max-width:100vw!important;
        margin:0!important;
        padding:0!important;
        overflow:hidden!important;
        display:block!important;
      }
      #paperContainer{
        display:block!important;
        overflow:hidden!important;
        margin-left:auto!important;
        margin-right:auto!important;
      }
      #paperContainer .paper{
        width:794px!important;
        max-width:none!important;
        min-width:794px!important;
        transform-origin:top left!important;
        margin:0!important;
        box-shadow:0 12px 30px rgba(15,23,42,.06)!important;
      }
    }

    @media print{
      .publicOnlyNote,.staffOpenSystem{display:none!important;}
      .reportOnlyWrap{padding:0;background:#fff;display:block!important;}
      .reportOnlyBox,.paperbox,#paperContainer{width:auto!important;max-width:none!important;overflow:visible!important;margin:0!important;height:auto!important;}
      .paper{box-shadow:none!important;transform:none!important;margin:0 auto!important;}
    }
  </style>
</head>
<body data-report-view="true">
  <div class="reportOnlyWrap">
    <div class="reportOnlyBox">
      <div class="staffOpenSystem"><a id="openSystemReport" href="retina-report-new.html">เปิดในระบบ</a></div>
      <div class="publicOnlyNote">เอกสารรายงานผลการตรวจจอประสาทตา</div>
      <div class="paperbox">
        <div id="paperContainer"><div class="empty">กำลังโหลดรายงาน...</div></div>
      </div>
    </div>
  </div>
  <script src="retina-report-new.js?v=qr_public_report_only_44" defer></script>
  <script>
    (function(){
      function getReportId(){
        return new URLSearchParams(location.search).get('report_id') || '';
      }
      function updateSystemLink(){
        var link = document.getElementById('openSystemReport');
        if(!link) return;
        var id = getReportId();
        link.href = 'retina-report-new.html' + (id ? ('?report_id=' + encodeURIComponent(id)) : '');
      }
      function markLoggedInIfSession(){
        updateSystemLink();
        try{
          if(!window.supabase) return;
          var client = window.supabase.createClient('https://pncgbphbcmtlzrmwnhcy.supabase.co','sb_publishable_jOwAmvtqBPKPd7uyGqvaBQ_c4UEhh1K');
          client.auth.getSession().then(function(res){
            if(res && res.data && res.data.session){
              document.body.classList.add('logged-in');
            }
          }).catch(function(){});
        }catch(e){}
      }

      function isMobile(){
        return window.matchMedia('(max-width: 768px)').matches || /iPhone|Android|Mobile|Line\//i.test(navigator.userAgent || '');
      }

      function fitQrReportToMobile(){
        var container = document.getElementById('paperContainer');
        if(!container) return;
        var paper = container.querySelector('.paper');
        var box = document.querySelector('.paperbox');

        if(!paper) return;

        if(!isMobile()){
          container.style.width = '';
          container.style.maxWidth = '';
          container.style.height = '';
          container.style.marginLeft = '';
          container.style.marginRight = '';
          container.style.overflow = '';
          paper.style.width = '';
          paper.style.maxWidth = '';
          paper.style.minWidth = '';
          paper.style.transform = '';
          paper.style.transformOrigin = '';
          paper.style.margin = '';
          if(box){
            box.style.width = '';
            box.style.maxWidth = '';
            box.style.marginLeft = '';
            box.style.marginRight = '';
            box.style.overflow = '';
          }
          return;
        }

        var baseWidth = 794;
        var viewport = Math.min(window.innerWidth || 390, document.documentElement.clientWidth || window.innerWidth || 390);
        var available = Math.max(300, viewport - 16);
        var scale = Math.min(1, available / baseWidth);
        var scaledWidth = Math.ceil(baseWidth * scale);

        if(box){
          box.style.width = '100vw';
          box.style.maxWidth = '100vw';
          box.style.marginLeft = 'calc(50% - 50vw)';
          box.style.marginRight = 'calc(50% - 50vw)';
          box.style.overflow = 'hidden';
        }

        paper.style.width = baseWidth + 'px';
        paper.style.maxWidth = 'none';
        paper.style.minWidth = baseWidth + 'px';
        paper.style.transformOrigin = 'top left';
        paper.style.transform = 'scale(' + scale + ')';
        paper.style.margin = '0';

        container.style.width = scaledWidth + 'px';
        container.style.maxWidth = scaledWidth + 'px';
        container.style.marginLeft = 'auto';
        container.style.marginRight = 'auto';
        container.style.overflow = 'hidden';

        requestAnimationFrame(function(){
          container.style.height = Math.ceil(paper.offsetHeight * scale) + 'px';
        });
      }

      function initFitObserver(){
        var target = document.getElementById('paperContainer');
        if(target){
          new MutationObserver(function(){
            setTimeout(fitQrReportToMobile, 80);
            setTimeout(fitQrReportToMobile, 350);
            setTimeout(fitQrReportToMobile, 900);
          }).observe(target,{childList:true,subtree:true});
        }
        window.addEventListener('resize', function(){ setTimeout(fitQrReportToMobile, 80); });
        window.addEventListener('orientationchange', function(){ setTimeout(fitQrReportToMobile, 300); });
        window.addEventListener('load', function(){ setTimeout(fitQrReportToMobile, 300); });
        setTimeout(fitQrReportToMobile, 300);
        setTimeout(fitQrReportToMobile, 900);
      }

      function boot(){
        markLoggedInIfSession();
        initFitObserver();
      }

      if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
      else boot();
    })();
  </script>
</body>
</html>
