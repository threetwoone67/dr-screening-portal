<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Report Document | DR Screening Portal</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="report-style.css?v=15">
  <style>
    body{background:#f4f7fd;margin:0;font-family:var(--font-main,'Sarabun',Arial,sans-serif)!important}
    .reportOnlyWrap{min-height:100vh;padding:18px 10px;display:flex;justify-content:center;align-items:flex-start}
    .reportOnlyBox{width:100%;max-width:940px}
    .reportOnlyNotice{background:#fff;border:1px solid #e5edf8;border-radius:16px;padding:12px 14px;margin-bottom:14px;color:#64748b;font-weight:800;box-shadow:0 10px 30px rgba(24,44,92,.06)}
    .paperbox{background:transparent;border:0;box-shadow:none;padding:0}
    .paper{margin:0 auto;max-width:100%;overflow:hidden}
    .empty{background:#fff;border:1px dashed #cbd5e1;border-radius:16px;padding:28px;text-align:center;color:#64748b;font-weight:800}
    #drSidebarHost,.dr-sidebar,.sidebar,aside.sidebar,.side-bar,.app-sidebar,.left-sidebar,.mobile-sidebar-toggle,.mobile-sidebar-overlay{display:none!important}
    body.has-dr-sidebar{padding-left:0!important}
    @media(max-width:768px){.reportOnlyWrap{padding:10px 4px}.reportOnlyNotice{font-size:13px;margin:0 8px 10px}.paper{transform-origin:top center}}
    @media print{.reportOnlyNotice{display:none}.reportOnlyWrap{padding:0;background:#fff}.paper{box-shadow:none}}
  </style>
</head>
<body data-report-view="true">
  <div class="reportOnlyWrap">
    <div class="reportOnlyBox">
      <div class="reportOnlyNotice">เอกสารรายงานผลการตรวจจอประสาทตา</div>
      <div class="paperbox">
        <div id="paperContainer"><div class="empty">กำลังโหลดรายงาน...</div></div>
      </div>
    </div>
  </div>
  <script src="retina-report-new.js?v=21" defer></script>
</body>
</html>
