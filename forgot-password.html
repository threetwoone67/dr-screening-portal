<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - DR Program</title>
  <style>
    /* ใช้ Style เดียวกับหน้า index.html */
    body, html { margin: 0; padding: 0; height: 100%; font-family: Arial, sans-serif; }
    .bg-image { background-image: url('https://images.unsplash.com/photo-1579684385127-1ef15d508118?q=80&w=2080'); background-size: cover; height: 100%; display: flex; align-items: center; justify-content: center; }
    .login-card { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(15px); padding: 40px; border-radius: 20px; width: 400px; text-align: center; color: white; border: 1px solid rgba(255, 255, 255, 0.2); }
    input { width: 100%; padding: 12px; border-radius: 10px; border: none; margin-bottom: 15px; }
    .btn-reset { width: 100%; padding: 12px; border: none; border-radius: 10px; background: #0f4c81; color: white; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>
  <div class="bg-image">
    <div class="login-card">
      <h2>Reset Password</h2>
      <p>ระบุอีเมลของคุณเพื่อรับลิงก์เปลี่ยนรหัสผ่าน</p>
      <form id="forgotForm">
        <input type="email" id="resetEmail" placeholder="Your Email" required>
        <button type="submit" class="btn-reset">Send Reset Link</button>
      </form>
      <p style="margin-top: 15px; font-size: 12px;"><a href="index.html" style="color: white;">กลับหน้าล็อกอิน</a></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseClient = window.supabase.createClient("https://qfoexrginskevvwzumye.supabase.co", "YOUR_PUBLISHABLE_KEY");

    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('resetEmail').value;

      const { data, error } = await supabaseClient.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/reset-new-password.html', // หน้าที่จะให้เขาไปตั้งรหัสใหม่
      });

      if (error) {
        alert("Error: " + error.message);
      } else {
        alert("ส่งลิงก์รีเซ็ตรหัสผ่านไปที่อีเมลของคุณแล้ว!");
      }
    });
  </script>
</body>
</html>
