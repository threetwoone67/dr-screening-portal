<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Register - DR Screening Portal</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(rgba(10, 40, 70, 0.45), rgba(10, 40, 70, 0.45)),
        url("https://images.unsplash.com/photo-1579684385127-1ef15d508118?auto=format&fit=crop&w=1600&q=80")
        center/cover no-repeat;
      color: white;
    }

    .topbar {
      background: linear-gradient(90deg, #0f4c81, #1f78b4);
      padding: 14px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      background: white;
      color: #0f4c81;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      font-size: 20px;
      flex-shrink: 0;
    }

    .brand-text h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
    }

    .brand-text p {
      margin: 3px 0 0;
      font-size: 13px;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .language-select {
      border: none;
      outline: none;
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: bold;
      color: #0f4c81;
      background: white;
      cursor: pointer;
    }

    .back-link {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    .wrapper {
      min-height: calc(100vh - 70px);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 28px 18px;
    }

    .register-box {
      width: 100%;
      max-width: 820px;
      background: rgba(255, 255, 255, 0.23);
      backdrop-filter: blur(14px);
      border-radius: 24px;
      padding: 30px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.25);
    }

    .register-box h2 {
      margin: 0;
      font-size: 36px;
      text-align: center;
    }

    .register-box .subtitle {
      text-align: center;
      margin: 8px 0 24px;
      font-size: 15px;
      opacity: 0.95;
    }

    .form-section-title {
      grid-column: 1 / -1;
      font-size: 16px;
      font-weight: bold;
      margin-top: 8px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.35);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    .form-group.full {
      grid-column: 1 / -1;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 7px;
      font-size: 14px;
    }

    .required {
      color: #ffd166;
    }

    input,
    select {
      width: 100%;
      padding: 13px 14px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      outline: none;
      background: rgba(255, 255, 255, 0.95);
      color: #102a43;
    }

    input:focus,
    select:focus {
      box-shadow: 0 0 0 3px rgba(62, 179, 230, 0.35);
    }

    .hint {
      margin-top: 5px;
      font-size: 12px;
      opacity: 0.9;
    }

    .message {
      margin-bottom: 14px;
      padding: 11px 12px;
      border-radius: 10px;
      font-size: 14px;
      display: none;
      text-align: center;
      font-weight: bold;
    }

    .error {
      background: rgba(255, 0, 0, 0.2);
      border: 1px solid rgba(255, 0, 0, 0.4);
    }

    .success {
      background: rgba(0, 128, 0, 0.2);
      border: 1px solid rgba(0, 128, 0, 0.4);
    }

    .register-btn {
      margin-top: 20px;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #3eb3e6;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .register-btn:hover {
      background: #1ea0d7;
    }

    .register-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .login-note {
      margin-top: 16px;
      text-align: center;
      font-size: 14px;
    }

    .login-note a {
      color: white;
      font-weight: bold;
    }

    @media (max-width: 720px) {
      .topbar {
        flex-direction: column;
        align-items: flex-start;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .register-box h2 {
        font-size: 30px;
      }
    }
  </style>
</head>

<body>
  <div class="topbar">
    <div class="brand">
      <div class="logo">DR</div>

      <div class="brand-text">
        <h1 data-i18n="appTitle">Diabetic Retinopathy Detection Program</h1>
        <p data-i18n="appSubtitle">โปรแกรมตรวจวัดระดับเบาหวานขึ้นจอประสาทตา</p>
      </div>
    </div>

    <div class="topbar-right">
      <select data-language-select class="language-select">
        <option value="th">ไทย</option>
        <option value="en">English</option>
      </select>

      <a href="index.html" class="back-link" data-i18n="login">
        เข้าสู่ระบบ
      </a>
    </div>
  </div>

  <div class="wrapper">
    <div class="register-box">
      <h2 data-i18n="registerTitle">สร้างบัญชีผู้ใช้งาน</h2>
      <p class="subtitle" data-i18n="registerSub">
        สำหรับแพทย์ พยาบาล/ผู้ช่วยแพทย์ และแอดมินที่ใช้งานระบบตรวจคัดกรองจอประสาทตาเบาหวาน
      </p>

      <div id="message" class="message"></div>

      <div class="form-grid">
        <div class="form-section-title" data-i18n="loginInfo">ข้อมูลเข้าสู่ระบบ</div>

        <div class="form-group">
          <label><span data-i18n="email">อีเมล</span> <span class="required">*</span></label>
          <input type="email" id="email" placeholder="example@email.com" data-i18n-placeholder="emailExample" autocomplete="email">
        </div>

        <div class="form-group">
          <label><span data-i18n="role">บทบาทผู้ใช้งาน</span> <span class="required">*</span></label>
          <select id="role">
            <option value="" data-i18n="selectRole">-- เลือกบทบาท --</option>
            <option value="doctor" data-i18n="doctor">แพทย์</option>
            <option value="nurse_assistant" data-i18n="nurse">พยาบาล / ผู้ช่วยแพทย์</option>
            
          </select>
        </div>

        <div class="form-group">
          <label><span data-i18n="password">รหัสผ่าน</span> <span class="required">*</span></label>
          <input type="password" id="password" placeholder="อย่างน้อย 6 ตัวอักษร" data-i18n-placeholder="passwordPlaceholder" autocomplete="new-password">
          <div class="hint" data-i18n="passHint">ควรมีอย่างน้อย 6 ตัวอักษร</div>
        </div>

        <div class="form-group">
          <label><span data-i18n="confirmPassword">ยืนยันรหัสผ่าน</span> <span class="required">*</span></label>
          <input type="password" id="confirmPassword" placeholder="กรอกรหัสผ่านอีกครั้ง" data-i18n-placeholder="confirmPasswordPlaceholder" autocomplete="new-password">
        </div>

        <div class="form-section-title" data-i18n="profileInfo">ข้อมูลประวัติส่วนตัว</div>

        <div class="form-group">
          <label><span data-i18n="fullName">ชื่อ-นามสกุล</span> <span class="required">*</span></label>
          <input type="text" id="fullName" placeholder="เช่น นพ. สมชาย ใจดี" data-i18n-placeholder="fullNamePlaceholder">
        </div>

        <div class="form-group">
          <label data-i18n="position">ตำแหน่ง</label>
          <input type="text" id="position" placeholder="เช่น จักษุแพทย์ / พยาบาลวิชาชีพ" data-i18n-placeholder="positionPlaceholder">
        </div>

        <div class="form-group">
          <label><span data-i18n="department">แผนก</span> <span class="required">*</span></label>
          <input type="text" id="department" placeholder="เช่น จักษุวิทยา" data-i18n-placeholder="departmentPlaceholder">
        </div>

        <div class="form-group">
          <label><span data-i18n="hospital">โรงพยาบาล / หน่วยงาน</span> <span class="required">*</span></label>
          <input type="text" id="hospitalName" placeholder="เช่น โรงพยาบาลนครเวช" data-i18n-placeholder="hospitalPlaceholder">
        </div>

        <div class="form-group">
          <label data-i18n="hospitalCode">รหัสโรงพยาบาล</label>
          <input type="text" id="hospitalCode" placeholder="ถ้ามี" data-i18n-placeholder="hospitalCodePlaceholder">
        </div>

        <div class="form-group">
          <label data-i18n="phone">เบอร์โทร</label>
          <input type="text" id="phone" placeholder="เช่น 0812345678" data-i18n-placeholder="phonePlaceholder">
        </div>

        <div class="form-group full">
          <label data-i18n="licenseNo">เลขใบประกอบวิชาชีพ / เลขประจำตัวบุคลากร</label>
          <input type="text" id="licenseNo" placeholder="กรอกเฉพาะกรณีที่มี" data-i18n-placeholder="licenseNoPlaceholder">
        </div>
      </div>

      <button id="registerBtn" class="register-btn" onclick="createUser()" data-i18n="registerBtn">
        สร้างบัญชีผู้ใช้งาน
      </button>

      <div class="login-note">
        <span data-i18n="haveAccount">มีบัญชีแล้ว?</span>
        <a href="index.html" data-i18n="backToLogin">กลับไปเข้าสู่ระบบ</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="language.js"></script>
<script>
   const supabaseUrl = "https://pncgbphbcmtlzrmwnhcy.supabase.co";

const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBuY2dicGhiY210bHpybXduaGN5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyODEwOTksImV4cCI6MjA5NDg1NzA5OX0.-JS7vYBzMJYybm5QA4RxKUA5rTa5ibR2_40W73PPYso";
    const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

    function showMessage(text, type) {
      const box = document.getElementById("message");
      box.style.display = "block";
      box.className = "message " + type;
      box.textContent = text;
    }

    function setLoading(isLoading) {
      const btn = document.getElementById("registerBtn");
      btn.disabled = isLoading;
      btn.textContent = isLoading ? (window.t ? t("loadingCreateAccount") : "กำลังสร้างบัญชี...") : (window.t ? t("registerBtn") : "สร้างบัญชีผู้ใช้งาน");
    }

    function validateEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    async function createUser() {
      const fullName = document.getElementById("fullName").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const confirmPassword = document.getElementById("confirmPassword").value.trim();
      const role = document.getElementById("role").value;
      const position = document.getElementById("position").value.trim();
      const department = document.getElementById("department").value.trim();
      const hospitalName = document.getElementById("hospitalName").value.trim();
      const hospitalCode = document.getElementById("hospitalCode").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const licenseNo = document.getElementById("licenseNo").value.trim();

      if (!email || !password || !confirmPassword || !role || !fullName || !department || !hospitalName) {
        showMessage(window.t ? t("requiredMessage") : "กรุณากรอกข้อมูลที่มีเครื่องหมาย * ให้ครบ", "error");
        return;
      }

      if (!validateEmail(email)) {
        showMessage(window.t ? t("invalidEmail") : "รูปแบบอีเมลไม่ถูกต้อง", "error");
        return;
      }

      if (password.length < 6) {
        showMessage(window.t ? t("passwordMin") : "รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร", "error");
        return;
      }

      if (password !== confirmPassword) {
        showMessage(window.t ? t("passwordMismatch") : "รหัสผ่านและยืนยันรหัสผ่านไม่ตรงกัน", "error");
        return;
      }

      setLoading(true);

      try {
        const { error } = await supabaseClient.auth.signUp({
          email,
          password,
          options: {
            data: {
              full_name: fullName,
              role: role,
              position: position,
              department: department,
              hospital_name: hospitalName,
              hospital_code: hospitalCode,
              phone: phone,
              license_no: licenseNo
            }
          }
        });

        if (error) {
          showMessage((window.t ? t("signUpFailed") : "สร้างบัญชีไม่สำเร็จ: ") + error.message, "error");
          setLoading(false);
          return;
        }

        showMessage(window.t ? t("signUpSuccess") : "สร้างบัญชีผู้ใช้งานสำเร็จ ระบบจะบันทึกข้อมูลบุคลากรให้อัตโนมัติ กรุณาตรวจสอบอีเมลเพื่อยืนยันบัญชี", "success");

        setTimeout(() => {
          window.location.href = "index.html";
        }, 2000);

      } catch (err) {
        showMessage((window.t ? t("errorPrefix") : "เกิดข้อผิดพลาด: ") + err.message, "error");
        setLoading(false);
      }
    }
  </script>
</body>
</html>
