<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reset Password</title>
<style>
* {
box-sizing: border-box;
}

body {
margin: 0;
font-family: Arial, sans-serif;
min-height: 100vh;
background:
linear-gradient(rgba(8, 32, 70, 0.68), rgba(8, 32, 70, 0.68)),
url("https://images.unsplash.com/photo-1579684385127-1ef15d508118?auto=format&fit=crop&w=1600&q=80")
no-repeat center center / cover;
display: flex;
justify-content: center;
align-items: center;
color: white;
}

.box {
width: 380px;
background: rgba(255,255,255,0.12);
backdrop-filter: blur(10px);
border-radius: 18px;
padding: 28px;
text-align: center;
box-shadow: 0 12px 30px rgba(0, 0, 0, 0.28);
}

h2 {
margin-top: 0;
}

input {
width: 100%;
padding: 12px;
border: none;
border-radius: 10px;
margin-bottom: 12px;
font-size: 14px;
}

button {
width: 100%;
padding: 12px;
border: none;
border-radius: 10px;
background: #00b4d8;
color: white;
font-weight: bold;
cursor: pointer;
font-size: 15px;
}

.message {
margin-top: 14px;
min-height: 20px;
line-height: 1.5;
}
</style>
</head>
<body>
<div class="box">
<h2>Create New Password</h2>
<p>Enter your new password.</p>

<input type="password" id="newPassword" placeholder="New Password" />
<input type="password" id="confirmPassword" placeholder="Confirm New Password" />

<button onclick="updatePassword()">Save New Password</button>

<div class="message" id="messageBox"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supabaseClient = window.supabase.createClient(
"https://qfoexrginskevvwzumye.supabase.co",
"sb_publishable_9-vavqDFhEEZdcdTwvqJ0Q_6vL-JSIn"
);

const messageBox = document.getElementById("messageBox");

function showMessage(text, isError = false) {
messageBox.textContent = text;
messageBox.style.color = isError ? "#ffd1d1" : "#d9ffd6";
}

async function updatePassword() {
const newPassword = document.getElementById("newPassword").value.trim();
const confirmPassword = document.getElementById("confirmPassword").value.trim();

if (!newPassword || !confirmPassword) {
showMessage("Please fill in both password fields.", true);
return;
}

if (newPassword !== confirmPassword) {
showMessage("Passwords do not match.", true);
return;
}

const { error } = await supabaseClient.auth.updateUser({
password: newPassword
});

if (error) {
showMessage("Update failed: " + error.message, true);
} else {
showMessage("Password updated successfully. Redirecting to login...");
setTimeout(() => {
window.location.href = "index.html";
}, 1200);
}
}
</script>
<script src="dashboard-language.js"></script>
</body>
</html>
